    <section class="contenidorContacte">
        <div class="contacte">
            <h1>Contacta amb nosaltres</h1>
            <p>Si tens alguna pregunta, suggeriment o simplement vols posar-te en contacte amb nosaltres, no dubtis a enviar-nos un missatge</p>
            <form class="formulariContacte">
                <label for="nom"><b>Nom:</b></label>
                <input type="text" id="nom" name="nom" required>
                <label for="email"><b>Email:</b></label>
                <input type="email" id="email" name="email" required>
                <label for="missatge"><b>Missatge:</b></label>
                <textarea id="missatge" name="missatge" required></textarea>
                <button type="submit" class="botoEnviar"><b>Enviar</b></button>
            </form>
        </div>
    </section>

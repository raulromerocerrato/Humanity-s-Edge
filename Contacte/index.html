    <main>
        <div class="contenidorContacte">
            <aside>
                <img src="../IMG/Personatge.png" alt="Imatge Personatge" class="imgPersonatge" data-src-dark="/IMG/Personatge.png" data-src-light="../IMG/Personaje_blanco.png">
            </aside>
            <section class="contenidorContacte">
                <div class="contacte">
                    <h1>Contacta amb nosaltres</h1>
                    <p>Si tens alguna pregunta, suggeriment o simplement vols posar-te en contacte amb nosaltres, no dubtis a enviar-nos un missatge</p>
                    <form class="formulariContacte">
                        <label for="nom">Nom:</label>
                        <input type="text" id="nom" name="nom" required>
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                        <label for="missatge">Missatge:</label>
                        <textarea id="missatge" name="missatge" required></textarea>
                        <button type="submit" class="botoEnviar" onclick="afegirMissatge(event)"><b>Enviar</b></button>
                    </form>
                </div>
            </section>
            <aside>
                <img src="../IMG/Jeringuilla.png" alt="Imatge Jeringuilla" class="imgJeringuilla">
            </aside>
            <hr>
        </div>
